<!DOCTYPE html>
<html lang="ru">
    <style>
    .arjs-loader {
        height: 100%;
        width: 100%;
        position: absolute;
        top: 0;
        left: 0;
        z-index: 9999;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .arjs-loader div {
        text-align: center;
        font-size: 1.25em;
        color: white;
    }
    </style>

    <head>
        <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    </head>
	<script src="https://aframe.io/releases/1.0.4/aframe.min.js"></script>
    <script src="https://rawgit.com/jeromeetienne/AR.js/master/aframe/build/aframe-ar.min.js"></script>
    <script src="https://rawgit.com/donmccurdy/aframe-extras/master/dist/aframe-extras.loaders.min.js"></script>
    <script src="https://cdn.8thwall.com/web/aframe/aframe-extras-7.2.0.min.js"></script>

    <script>
        window.onload = function () {

            AFRAME.registerComponent('raycaster-listen', {
                init: function () {
                    // Use events to figure out what raycaster is listening so we don't have to
                    // hardcode the raycaster.
                    this.el.addEventListener('raycaster-intersected', evt => {
                        this.raycaster = evt.detail.el;
                    });
                    this.el.addEventListener('raycaster-intersected-cleared', evt => {
                        this.raycaster = null;
                    });
                },

                tick: function () {
                    if (!this.raycaster) { return; }  // Not intersecting.

                    let intersection = this.raycaster.components.raycaster.getIntersection(this.el);
                    if (!intersection) { return; }
                    alert(intersection.point);
                }
            });

        }
    </script>




    <body style="margin : 0px; overflow: hidden;">
        <a-scene embedded arjs>

            <a-entity raycaster="objects: .clickable" cursor></a-entity>
            <a-entity class="clickable" geometry="primitive: box" position="1 0 0" scale="0.25 0.25 0.25"></a-entity>
            <a-entity class="not-clickable" geometry="primitive: sphere" position="-1 0 0" scale="0.25 0.25 0.25"></a-entity>

            <a-entity id="raycaster" raycaster></a-entity>
            <a-entity geometry material raycaster-listen></a-entity>
            
        </a-scene>
    </body>
</html>
