<!DOCTYPE html>
<html lang="ru">
    <style>
    .arjs-loader {
        height: 100%;
        width: 100%;
        position: absolute;
        top: 0;
        left: 0;
        z-index: 9999;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .arjs-loader div {
        text-align: center;
        font-size: 1.25em;
        color: white;
    }
    </style>

    <head>
        <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    </head>
	<script src="https://aframe.io/releases/1.0.4/aframe.min.js"></script>
    <script src="https://rawgit.com/jeromeetienne/AR.js/master/aframe/build/aframe-ar.min.js"></script>
    <script src="https://rawgit.com/donmccurdy/aframe-extras/master/dist/aframe-extras.loaders.min.js"></script>
    <script src="https://cdn.8thwall.com/web/aframe/aframe-extras-7.2.0.min.js"></script>

    <script>
        window.onload = function () {
            // Component to change to a sequential color on click.
            AFRAME.registerComponent('collider-check', {
                dependencies: ['raycaster'],

                init: function () {
                    this.el.addEventListener('raycaster-intersection', function () {
                        alert('Что-то произошло № 1');
                    });
                }
            });
        }
    </script>
    
    <body style="margin : 0px; overflow: hidden;">
        <a-scene embedded arjs>

            <a-entity id="player">
                <a-entity 
                    collider-check raycaster="objects: .collidable; showLine:true;" 
                    position="0 1 0"
                ></a-entity
            ></a-entity>

            <a-entity class="collidable" geometry="primitive: box"  position="0 1 -3"></a-entity>

        </a-scene>
    </body>
</html>
