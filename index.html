<html>
<head>
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.js"></script>
    <style>
        body,#renderCanvas { width: 100%; height: 100%;}
    </style>
</head>
<body>
    <canvas id="renderCanvas"></canvas>
    <script type="module">
        const canvas = document.getElementById("renderCanvas");
        const engine = new BABYLON.Engine(canvas);//, true);

        const createScene = function() {
            let scene = new BABYLON.Scene(engine);
            // Создание среды по умолчанию (для вывода текстур 3D-модели)
            scene.createDefaultEnvironment({
              createSkybox: false,
              createGround: false
            });

            const alpha =  Math.PI/4;
            const beta = Math.PI/3;
            const radius = 8;
            const target = new BABYLON.Vector3(0, 0, 0);

            const camera = new BABYLON.ArcRotateCamera("Camera", alpha, beta, radius, target, scene);
            camera.attachControl(canvas, true);

            const light = new BABYLON.HemisphericLight("light", new BABYLON.Vector3(1, 1, 0));

            // Подключение WebXR
            scene.createDefaultXRExperienceAsync({
              uiOptions: {
                sessionMode: 'immersive-ar', 
                referenceSpaceType: 'local-floor',
              }
            });

            /*
            const box = BABYLON.MeshBuilder.CreateBox("box", {});
            box.position.x = 0.5;
            box.position.y = 1;

            const boxMaterial = new BABYLON.StandardMaterial("material", scene);
            boxMaterial.diffuseColor = BABYLON.Color3.Random();
            box.material = boxMaterial;

            box.actionManager = new BABYLON.ActionManager(scene);
            box.actionManager.registerAction(
                new BABYLON.ExecuteCodeAction(BABYLON.ActionManager.OnPickTrigger, 
                function (evt) {
                    const sourceBox = evt.meshUnderPointer;
                    sourceBox.position.x += 0.1;
                    sourceBox.position.y += 0.1;

                    boxMaterial.diffuseColor = BABYLON.Color3.Random();
                }));
            */

            //ЗАГРУЗКА 3D-МОДЕЛИ
            const propeller = BABYLON.SceneLoader.ImportMesh(
              null, 
              'assets/Fan/', 
              'Fan.gltf', 
              scene, 
              (meshArray) => {
                let fan = meshArray[0];
                fan.scaling = new BABYLON.Vector3(0.1, 0.1, 0.1);
                fan.position = new BABYLON.Vector3(0, 0, 1); //.Vector3(вправо, вверх, от меня)
                shadowGenerator.addShadowCaster(fan); //отбрасываемая тень
                fan.receiveShadows = true; //принимаемая тень
              }
            );
            propeller.actionManager = new BABYLON.ActionManager(scene);
            propeller.actionManager.registerAction(new BABYLON.ExecuteCodeAction(
              BABYLON.ActionManager.OnPickTrigger, 
              function (evt) {
                const newpropeller = evt.meshUnderPointer;
                //move the fan upright
                newpropeller.position.x += 1;
                newpropeller.position.y += 1;
            }));

            const ground = BABYLON.MeshBuilder.CreateGround("ground", {width: 4, height: 4});

            const xrPromise = scene.createDefaultXRExperienceAsync({
                floorMeshes: [ground]
            });

            return xrPromise.then((xrExperience) => {
                console.log("Done, WebXR is enabled.");
                return scene;
            });
        };

        createScene().then(sceneToRender => {
            engine.runRenderLoop(() => sceneToRender.render());
        });
    </script>
</body>
