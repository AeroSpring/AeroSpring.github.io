<!DOCTYPE html>
<html lang="ru">
    <style>
    .arjs-loader {
        height: 100%;
        width: 100%;
        position: absolute;
        top: 0;
        left: 0;
        z-index: 9999;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .arjs-loader div {
        text-align: center;
        font-size: 1.25em;
        color: white;
    }
    </style>

    <head>
        <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    </head>
	<script src="https://aframe.io/releases/1.0.4/aframe.min.js"></script>
    <script src="https://rawgit.com/jeromeetienne/AR.js/master/aframe/build/aframe-ar.min.js"></script>
    <script src="https://rawgit.com/donmccurdy/aframe-extras/master/dist/aframe-extras.loaders.min.js"></script>
    <script src="https://cdn.8thwall.com/web/aframe/aframe-extras-7.2.0.min.js"></script>

    <script>
        window.onload = function () {

            AFRAME.registerComponent('cursor-listener', {
                init: function () {
                    var lastIndex = -1;
                    var COLORS = ['red', 'green', 'blue'];
                    this.el.addEventListener('click', function (evt) {
                        lastIndex = (lastIndex + 1) % COLORS.length;
                        this.setAttribute('material', 'color', COLORS[lastIndex]);
                        alert('I was clicked at: ', evt.detail.intersection.point);
                    });
                }
            });
        }
    </script>




    <body style="margin : 0px; overflow: hidden;">
        <a-scene embedded arjs>

            <a-entity position="0 0 0">
                <a-entity camera look-controls wasd-controls>
                    <a-entity position="0 0 -3"
                        geometry="primitive: ring; radiusInner: 0.1; radiusOuter: 0.2;"
                        material="color: #f04661; shader: flat; opacity:0.2;"
                        cursor="maxDistance: 30; fuse: true">

                        <a-animation begin="click" easing="ease-in" attribute="scale" fill="forwards" from="0.2 0.2 0.2" to="1 1 1" dur="150"></a-animation>
                        <a-animation begin="fusing" easing="ease-in" attribute="scale" fill="backwards" from="1 1 1" to="0.2 0.2 0.2" dur="1500"></a-animation>
                    </a-entity>
                </a-entity>
            </a-entity>
                        
        </a-scene>
    </body>
</html>
