<!DOCTYPE html>
<html lang="ru">
    <style>
    .arjs-loader {
        height: 100%;
        width: 100%;
        position: absolute;
        top: 0;
        left: 0;
        z-index: 9999;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .arjs-loader div {
        text-align: center;
        font-size: 1.25em;
        color: white;
    }
    </style>

    <head>
        <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    </head>
	<script src="https://aframe.io/releases/1.0.4/aframe.min.js"></script>
    <script src="https://rawgit.com/jeromeetienne/AR.js/master/aframe/build/aframe-ar.min.js"></script>
    <script src="https://rawgit.com/donmccurdy/aframe-extras/master/dist/aframe-extras.loaders.min.js"></script>
    <script src="https://cdn.8thwall.com/web/aframe/aframe-extras-7.2.0.min.js"></script>

    <script>
        window.onload = function () {
            // Component to change to a sequential color on click.
            AFRAME.registerComponent('cursor-listener', {
                init: function () {
                    var lastIndex = -1;
                    var COLORS = ['red', 'green', 'blue'];
                    this.el.addEventListener('click', function (evt) {
                        lastIndex = (lastIndex + 1) % COLORS.length;
                        this.setAttribute('material', 'color', COLORS[lastIndex]);
                        console.log('I was clicked at: ', evt.detail.intersection.point);
                    });
                }
            });
        }
    </script>
    
    <body style="margin : 0px; overflow: hidden;">
        <a-scene embedded arjs="trackingMethod: best; debugUIEnabled: false;">

            <a-assets>
                <a-asset-item id="animated-asset" src="./assets/Interactive/Interactive.glb"></a-asset-item>
            </a-assets>

            <a-marker type="pattern" url="/markers/pattern-qr-code.patt">
                <!-- Plane to display the imafe -->
                <!--
                <a-plane id="imagePlane" position="0 0 0" rotation="-90 0 0" width="4" height="2.09" material="shader: flat; scale: 2 2 2; src:capture.jpg"></a-plane>
                -->

                <a-entity camera look-controls>
                    <a-entity cursor="fuse: true; fuseTimeout: 500"
                        position="0 0 -1"
                        geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.03"
                        material="color: black; shader: flat">
                    </a-entity>
                </a-entity>
    
                <a-entity id="box" cursor-listener geometry="primitive: box" material="color: blue"></a-entity>
            </a-marker>

        </a-scene>
    </body>
</html>
