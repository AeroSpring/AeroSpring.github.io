<!DOCTYPE html>
<html lang="ru">
<head>
	<title>Test AR #1</title>
	<script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
	<script src="https://cnd.rawgit.com/jeromeetienne/AR.js/2/1/7/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">
	<a-scene embedded arjs>
		<!-- Marker for tracking -->
		<a-marker type="pattern" url="/markers/pattern-qr-code.patt">
			<!-- Plane to display the imafe -->
			<a-plane id="imagePlane" position="0 0 0" rotation="-90 0 0" width="4" height="2.25" material="shader: flat; scale: 2 2 2"></a-plane>
			<!--
			<a-entity
				position="0 0 0"
				scale="0.2 0.2 0.2"
				gltf-model="obj/House/House.gltf"
			></a-entity>
			-->
		</a-marker>
		<!-- Camera to view the scene -->
		<a-entity camera></a-entity>
	</a-scene>
</body>
</html>
